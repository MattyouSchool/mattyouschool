<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DYLOKI | Shop</title>
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Syncopate:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo hover-glow" onclick="window.location.href='/'">DY<span>LOKI</span></div>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/games/">Games</a></li>
            <li><a href="https://www.youtube.com/@matyou333" target="_blank">YouTube</a></li>
            <li><a href="/shop/" class="highlight-link">Shop</a></li>
        </ul>
    </nav>

    <main class="container" style="text-align: center; padding-top: 50px;">
        <h1 style="font-family: 'Syncopate';">UPGRADE_<span>ZONE</span></h1>
        
        <div id="shop-xp-display" class="btn-sub" style="margin: 30px auto; display: inline-block; padding: 10px 30px; border-color: var(--cyan); color: var(--cyan); font-weight: 800;">
            SALDO: LADEN...
        </div>

        <div class="grid">
            <div class="mission-card interactive-border">
                <div style="font-size: 2.5rem;">🏅</div>
                <h3>BRONZE BADGE</h3>
                <button onclick="buyItem('Bronze Badge', 50)" class="btn-main" style="width: 100%;">50 XP</button>
            </div>
            <div class="mission-card interactive-border">
                <div style="font-size: 2.5rem;">🎨</div>
                <h3>CYAN GLOW</h3>
                <button onclick="buyItem('Cyan Glow', 150)" class="btn-main" style="width: 100%;">150 XP</button>
            </div>
        </div>
    </main>

    <footer class="footer-main" style="text-align: center; padding: 60px 0 40px; opacity: 0.8;">
        <p style="font-size: 0.9rem; margin-bottom: 5px;">Made by <strong>Mattyou Studios™ x Dylano</strong></p>
        <p style="font-size: 0.7rem; color: var(--text-muted);">&copy; All rights reserved</p>
    </footer>

    <script>
        // MOET EXACT HETZELFDE ZIJN ALS IN XP-SYSTEM.JS
        const XP_STORAGE_KEY = 'user_total_xp';

        function updateShop() {
            const xp = localStorage.getItem(XP_STORAGE_KEY) || 0;
            document.getElementById('shop-xp-display').innerText = `SALDO: ${xp} XP`;
        }

        function buyItem(name, price) {
            let xp = parseInt(localStorage.getItem(XP_STORAGE_KEY)) || 0;
            if (xp >= price) {
                xp -= price;
                localStorage.setItem(XP_STORAGE_KEY, xp);
                alert(`Gekocht: ${name}!`);
                updateShop();
            } else {
                alert("Niet genoeg XP!");
            }
        }

        window.onload = updateShop;
        setInterval(updateShop, 1000); // Check elke seconde voor updates
    </script>
</body>
</html>
