<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DYLOKI | Shop</title>
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Syncopate:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo hover-glow">DY<span>LOKI</span></div>
        <ul class="nav-links">
            <li><a href="../index.html">Home</a></li>
            <li><a href="../games/index.html">Games</a></li>
            <li><a href="https://www.youtube.com/@matyou333" target="_blank">YouTube</a></li>
            <li><a href="index.html" class="highlight-link">Shop</a></li>
        </ul>
        <div class="header-stats hover-glow">
            <span id="rank-tag" class="tag">RANK: ...</span>
            <span id="xp-counter" style="margin-left: 15px; font-weight: 800; color: var(--cyan);">XP: 0</span>
        </div>
    </nav>

    <header class="container" style="text-align: center; padding-top: 150px;">
        <h1 style="font-family: 'Syncopate'; font-size: 3rem; letter-spacing: 8px;">PREMIUM<span>_</span>SHOP</h1>
    </header>

    <main class="container">
        <div class="grid">
            <div class="glass-panel interactive-border" style="text-align: center;">
                <div style="font-size: 3rem; margin-bottom: 20px;">💎</div>
                <h3>VIP ACCESS</h3>
                <p style="color: var(--text-muted); margin-bottom: 20px;">Exclusieve vroege toegang tot nieuwe content.</p>
                <button class="btn-main" style="width: 100%;">COMING SOON</button>
            </div>
            <div class="glass-panel interactive-border" style="text-align: center;">
                <div style="font-size: 3rem; margin-bottom: 20px;">🛡️</div>
                <h3>ELITE TAG</h3>
                <p style="color: var(--text-muted); margin-bottom: 20px;">Koop een speciale badge voor bij je Rank.</p>
                <button class="btn-main" style="width: 100%;">COMING SOON</button>
            </div>
        </div>
    </main>

    <footer class="footer-main">
        <p>Made by <strong>Mattyou Studios™ x Dylano</strong></p>
    </footer>

    <script src="../xp-system.js"></script>
</body>
</html>
