<!DOCTYPE html>
<html lang="nl">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DYLOKI | Games</title>
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Syncopate:wght@700&display=swap" rel="stylesheet">

<body>
    <nav class="navbar">
        <div class="logo hover-glow" onclick="window.location.href='/'">DY<span>LOKI</span></div>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/games/" class="highlight-link">Games</a></li>

        </ul>

    <header class="container" style="text-align: center; padding-top: 60px;">
        <h1 style="font-family: 'Syncopate'; font-size: 2rem;">GAME_<span>DATABASE</span></h1>

    <main class="container">
        <h2 style="font-family: 'Syncopate'; font-size: 1rem; color: var(--cyan); margin-bottom: 30px;">PREMIUM GAMES</h2>

            <div class="glass-panel interactive-border">

        <div class="grid">
            <div class="mission-card interactive-border">
                <div style="font-size: 2rem;">🧱</div>
                <h3>BLOCK STACK</h3>
                <a href="/games/basic/tetris.html" class="btn-sub" style="width: 100%;">PLAY</a>
            </div>
            <div class="mission-card interactive-border">
                <div style="font-size: 2rem;">🦖</div>
                <h3>CYBER RUN</h3>
                <a href="/games/basic/dino.html" class="btn-sub" style="width: 100%;">PLAY</a>
            </div>
            <div class="mission-card interactive-border">
                <div style="font-size: 2rem;">🚀</div>
                <h3>GALAXY DEFENSE</h3>
                <a href="/games/basic/space.html" class="btn-sub" style="width: 100%;">PLAY</a>
