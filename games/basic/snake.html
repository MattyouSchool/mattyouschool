<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>DYLOKI | Retro Snake</title>
    <link rel="stylesheet" href="../../style.css">
</head>
<body style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden;">
    <h1 style="font-family: 'Syncopate'; margin-bottom: 10px;">SNAKE</h1>
    <canvas id="snakeGame" width="400" height="400" style="border: 2px solid var(--cyan); background: #000;"></canvas>
    <a href="../index.html" style="margin-top: 20px; color: var(--text-muted); text-decoration: none;">← Terug naar Games</a>

    <script>
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        let box = 20;
        let snake = [{x: 10 * box, y: 10 * box}];
        let food = {x: Math.floor(Math.random()*19+1)*box, y: Math.floor(Math.random()*19+1)*box};
        let d;

        document.addEventListener("keydown", direction);
        function direction(event) {
            if(event.keyCode == 37 && d != "RIGHT") d = "LEFT";
            else if(event.keyCode == 38 && d != "DOWN") d = "UP";
            else if(event.keyCode == 39 && d != "LEFT") d = "RIGHT";
            else if(event.keyCode == 40 && d != "UP") d = "DOWN";
        }

        function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0,0,400,400);
            for(let i=0; i<snake.length; i++){
                ctx.fillStyle = (i==0)? "#00e5ff" : "white";
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
            }
            ctx.fillStyle = "red";
            ctx.fillRect(food.x, food.y, box, box);
            let snakeX = snake[0].x;
            let snakeY = snake[0].y;
            if(d == "LEFT") snakeX -= box;
            if(d == "UP") snakeY -= box;
            if(d == "RIGHT") snakeX += box;
            if(d == "DOWN") snakeY += box;
            if(snakeX == food.x && snakeY == food.y){
                food = {x: Math.floor(Math.random()*19+1)*box, y: Math.floor(Math.random()*19+1)*box};
            } else { snake.pop(); }
            let newHead = {x: snakeX, y: snakeY};
            if(snakeX < 0 || snakeY < 0 || snakeX >= 400 || snakeY >= 400) location.reload();
            snake.unshift(newHead);
        }
        setInterval(draw, 100);
    </script>
</body>
</html>
