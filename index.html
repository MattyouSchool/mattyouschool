<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DYLOKI | Premium Blue</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo">DY<span>LOKI</span></div>
        <ul class="nav-links">
            <li><a href="index.html" style="color: var(--primary-blue); opacity: 1;">Home</a></li>
            <li><a href="games/index.html">Games</a></li>
            <li><a href="shop/index.html">Shop</a></li>
            <li><a href="about/index.html">About</a></li>
        </ul>
        <div class="user-stats-nav">
            <span id="nav-xp">XP: 0</span> | <span id="nav-coins">🪙 0</span>
        </div>
    </nav>

    <header class="hero-premium">
        <div class="hero-content">
            <h1 class="main-title">DYLOKI</h1>
            <p style="letter-spacing: 10px; font-weight: 300; color: var(--primary-blue);">MATTYOU STUDIOS™ X DYLANO</p>
        </div>
    </header>

    <main class="container">
        <section id="main-content" style="display:none;" class="glass-card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
                <h2 style="font-family:'Syncopate';">AGENT: <span id="user-welcome" style="color:var(--primary-blue);">---</span></h2>
                <button onclick="logout()" style="background:#ff4b2b; color:#fff; border:none; padding:8px 18px; border-radius:10px; cursor:pointer; font-weight:bold;">DISCONNECT</button>
            </div>
            <div class="grid">
                <div class="stat-box"><h3>CURRENT RANK</h3><p id="rank-display" style="color:var(--primary-blue);">...</p></div>
                <div class="stat-box"><h3>XP POINTS</h3><p id="xp-display">0</p></div>
                <div class="stat-box"><h3>CREDITS</h3><p id="coin-display" style="color:#ffcc00;">0</p></div>
            </div>
            <div class="progress-container"><div id="progress-bar" class="progress-bar"></div></div>
        </section>

        <section id="auth-section" class="glass-card">
            <h2 style="text-align:center; margin-bottom:40px; font-family:'Syncopate'; letter-spacing:4px;">DATABASE ACCESS</h2>
            <div class="grid">
                <div class="auth-box">
                    <h3 style="margin-bottom:20px;">LOGIN</h3>
                    <input type="text" id="log-user" placeholder="Username">
                    <input type="password" id="log-pass" placeholder="Password">
                    <button class="btn-primary" onclick="login()">LOGIN TO CLOUD</button>
                </div>
                <div class="auth-box">
                    <h3 style="margin-bottom:20px;">SIGN UP</h3>
                    <input type="text" id="reg-user" placeholder="New Username">
                    <input type="password" id="reg-pass" placeholder="New Password">
                    <button class="btn-secondary" onclick="register()">CREATE ACCOUNT</button>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer-premium">
        <p>BUILD BY <strong>MATTYOU STUDIOS™ X DYLANO</strong></p>
    </footer>

    <script type="module" src="script.js"></script>
</body>
</html>
