<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dyloki | Home</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="logo">DYLOKI<span>.</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="games/">Games</a></li>
            <li><a href="shop/">Coin Shop</a></li>
            <li><a href="about/">Over Ons</a></li>
        </ul>
        <div class="user-stats-nav">
            <span id="nav-xp">XP: 0</span> | <span id="nav-coins">🪙 0</span>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>Welkom bij <span class="highlight">Dyloki</span></h1>
            <p>Het officiële platform van mattyou studios™ & Dylano</p>
        </div>
    </header>

    <main class="container">
        <section class="status-card">
            <h2>Jouw Progressie</h2>
            <div class="grid">
                <div class="stat-item">
                    <p>Huidige Rank</p>
                    <h2 id="rank-display">Laden...</h2>
                </div>
                <div class="stat-item">
                    <p>Totaal XP</p>
                    <h2 id="xp-display">0</h2>
                </div>
                <div class="stat-item">
                    <p>Dyloki Coins</p>
                    <h2 id="coin-display" style="color: #ffd700;">0</h2>
                </div>
            </div>
            <p>Voortgang tot volgende Rank:</p>
            <div class="progress-bar-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
        </section>
    </main>

    <footer>
        <p>Dyloki is made by <strong>mattyou studios™ x Dylano</strong></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
